<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>磨 — 手と光のアトリエ</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"
        onerror="window.__mpFailed=true"></script>
<style>
  :root{
    --bg:#15161a; --ink:#f2f1ec; --sub:#9b9a94; --faint:#67665f;
    --card:#1f2126; --accent:#4f7fff; --line:rgba(255,255,255,.14);
    --shadow:0 20px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.05);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{height:100%; overscroll-behavior:none}
  body{
    font-family:"Hiragino Sans","Yu Gothic",sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #1b1d22 0%, var(--bg) 60%),
      var(--bg);
    color:var(--ink);
    display:flex; flex-direction:column;
    max-width:520px; margin:0 auto;
  }
  /* ---------- ヘッダ ---------- */
  header{
    flex:none; text-align:center;
    padding:calc(14px + env(safe-area-inset-top)) 0 14px;
  }
  .overline{
    font-size:8.5px; letter-spacing:.55em; color:var(--faint);
    text-transform:uppercase; margin-bottom:6px; text-indent:.55em;
  }
  header h1{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    font-size:clamp(56px, 19vw, 72px); font-weight:800; line-height:1;
    letter-spacing:0;
    background:linear-gradient(135deg, #5c5f66 0%, #f4f3ee 45%, #5c5f66 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 26px rgba(79,127,255,.28));
  }
  header .rule{
    width:28px; height:1px; background:var(--ink); opacity:.35;
    margin:12px auto 0;
  }
  /* ---------- ステージ ---------- */
  .stage{
    position:relative; flex:1; min-height:0; margin:0 18px;
    background:#1a1c20; border-radius:14px; overflow:hidden;
    box-shadow:var(--shadow);
  }
  #canvas{width:100%; height:100%; object-fit:cover; display:block}
  #startOverlay{
    position:absolute; inset:0; z-index:5;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:32px;
    background:radial-gradient(90% 70% at 50% 20%, #23262c 0%, #16171b 100%);
  }
  #startOverlay .invite{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",sans-serif; font-size:14px;
    letter-spacing:.5em; text-indent:.5em; color:#a3a29b; margin-bottom:34px;
  }
  .bigbtn{
    border:none; border-radius:14px; padding:16px 50px;
    background:linear-gradient(135deg, #6a97ff, #3560e6);
    color:#f6f8ff; font-size:13px; letter-spacing:.3em; text-indent:.3em;
    font-family:inherit; cursor:pointer;
    box-shadow:0 10px 30px rgba(63,111,238,.42);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .bigbtn:active{transform:scale(.97); box-shadow:0 4px 14px rgba(63,111,238,.42)}
  #status{
    margin-top:26px; font-size:10px; letter-spacing:.2em; color:var(--faint);
    min-height:14px; transition:opacity .3s;
  }
  #guide{
    position:absolute; top:16px; left:0; right:0; text-align:center; z-index:4;
    font-size:11px; letter-spacing:.25em; text-indent:.25em; color:#fff;
    text-shadow:0 1px 8px rgba(0,0,0,.5); pointer-events:none;
    transition:opacity .5s;
  }
  #countdown{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    font-family:"Hiragino Kaku Gothic ProN",sans-serif; font-size:96px; font-weight:300; color:#fff;
    text-shadow:0 2px 24px rgba(0,0,0,.4); z-index:6; pointer-events:none;
  }
  .stagebtns{
    position:absolute; bottom:16px; left:0; right:0; z-index:5;
    display:flex; align-items:center; justify-content:center; gap:28px;
  }
  .shutter{
    width:60px; height:60px; border-radius:50%; cursor:pointer;
    border:3px solid rgba(255,255,255,.95);
    background:rgba(255,255,255,.18); backdrop-filter:blur(6px);
    transition:background .15s;
  }
  .shutter:active{background:#fff}
  .roundbtn{
    width:40px; height:40px; border-radius:50%; border:none; cursor:pointer;
    background:rgba(20,20,20,.32); color:#fff; font-size:15px; backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
  }
  #snapBar{
    position:absolute; bottom:16px; left:0; right:0; z-index:7;
    display:none; justify-content:center; gap:10px;
  }
  #snapBar .pill{
    border:none; border-radius:999px; padding:13px 26px; font-size:12px;
    font-family:inherit; letter-spacing:.18em; text-indent:.18em; cursor:pointer;
    background:rgba(20,20,20,.5); color:#fff; backdrop-filter:blur(8px);
  }
  #snapBar .pill.primary{background:#f6f8ff; color:#15161a}
  /* ---------- 下部パネル ---------- */
  .panel{
    flex:none;
    padding:14px 20px calc(12px + env(safe-area-inset-bottom));
  }
  .tabs{display:flex; gap:20px; margin-bottom:12px; justify-content:center; flex-wrap:wrap}
  .tab{
    position:relative;
    font-size:10.5px; letter-spacing:.3em; text-indent:.3em;
    color:var(--faint); padding:4px 0 7px; cursor:pointer;
    transition:color .25s;
  }
  .tab::after{
    content:""; position:absolute; left:50%; bottom:0; height:1px; width:0;
    background:var(--ink); transform:translateX(-50%);
    transition:width .25s ease;
  }
  .tab.active{color:var(--ink)}
  .tab.active::after{width:100%}
  .tray{display:none}
  .tray.active{display:block; animation:rise .3s ease}
  @keyframes rise{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}
  .scroller{
    display:flex; gap:13px; overflow-x:auto; padding:6px 2px 6px;
    scrollbar-width:none;
  }
  .scroller::-webkit-scrollbar{display:none}
  /* デザインサムネ：爪型 */
  .look{flex:none; text-align:center; cursor:pointer}
  .look canvas{
    width:52px; height:66px; display:block; margin:0 auto;
    border-radius:24px 24px 20px 20px;
    background:var(--card);
    box-shadow:0 3px 10px rgba(0,0,0,.4);
    border:1.5px solid transparent;
    transition:transform .2s ease, border-color .2s;
  }
  .look.active canvas{border-color:var(--ink); transform:translateY(-3px)}
  .look span{
    font-size:9px; letter-spacing:.06em; color:var(--sub);
    display:block; margin-top:6px;
  }
  .look.active span{color:var(--ink)}
  /* 色チップ */
  .chip{
    flex:none; width:36px; height:36px; border-radius:50%; cursor:pointer;
    border:2px solid transparent;
    box-shadow:inset 0 -7px 10px rgba(0,0,0,.3), inset 0 4px 6px rgba(255,255,255,.2), 0 2px 10px rgba(0,0,0,.4);
    transition:transform .2s ease;
  }
  .chip.active{border-color:var(--ink); transform:scale(1.12)}
  .chip.picker{
    background:conic-gradient(from 0deg, #e63946, #f4a52a, #f6e04a, #4ac97a, #3f6fee, #8a4fd9, #e63946) !important;
    position:relative;
  }
  .chip.picker::after{
    content:"+"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:15px; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,.6);
  }
  .minirow{
    display:flex; align-items:center; gap:12px; margin-top:10px;
    font-size:10px; letter-spacing:.15em; color:var(--sub);
  }
  input[type=range]{
    flex:1; -webkit-appearance:none; appearance:none; height:22px; background:transparent;
  }
  input[type=range]::-webkit-slider-runnable-track{
    height:1.5px; background:var(--line); border-radius:2px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background:var(--card); border:1.5px solid var(--ink);
    margin-top:-7.5px; box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  .ghostlink{
    font-size:10.5px; color:var(--accent); letter-spacing:.12em;
    text-decoration:underline; text-underline-offset:4px; text-decoration-thickness:.5px;
    cursor:pointer; white-space:nowrap;
  }
  #note{
    font-size:10.5px; color:var(--sub); margin-top:8px; min-height:15px;
    line-height:1.8; letter-spacing:.05em;
  }
  .presetgroup{margin-bottom:16px}
  .presetgroup:last-child{margin-bottom:0}
  .presetlabel{
    font-size:10px; letter-spacing:.25em; text-indent:.1em; color:var(--sub);
    margin-bottom:8px;
  }
  .presetrow{display:flex; gap:8px}
  .presetbtn{
    flex:1; border:1px solid var(--line); border-radius:10px; padding:10px 4px;
    background:transparent; color:var(--sub); font-family:inherit;
    font-size:10.5px; letter-spacing:.04em; cursor:pointer;
    transition:background .2s ease, color .2s ease, border-color .2s ease;
  }
  .presetbtn.active{background:var(--accent); border-color:var(--accent); color:#f6f8ff}
  input[type=file]{display:none}
  /* 追加タイル */
  .addtile .addbox{
    width:52px; height:66px; margin:0 auto;
    border-radius:24px 24px 20px 20px;
    border:1.2px dashed var(--faint); color:var(--sub);
    display:flex; align-items:center; justify-content:center;
    font-size:9.5px; letter-spacing:.05em; line-height:1.5;
    background:rgba(255,255,255,.04);
  }
  /* 光の軌跡タブ */
  .toggle-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 2px; font-size:11.5px; letter-spacing:.1em; color:var(--ink);
  }
  .switch{
    position:relative; width:42px; height:24px; border-radius:999px;
    background:var(--line); cursor:pointer; transition:background .25s;
    flex:none;
  }
  .switch.on{background:var(--accent)}
  .switch::after{
    content:""; position:absolute; top:3px; left:3px; width:18px; height:18px;
    border-radius:50%; background:#f6f8ff; box-shadow:0 1px 4px rgba(0,0,0,.4);
    transition:transform .25s ease;
  }
  .switch.on::after{transform:translateX(18px)}
  .hikari-desc{
    font-size:10.5px; color:var(--sub); line-height:1.9; letter-spacing:.05em;
    margin-top:6px;
  }
  .swatchrow{display:flex; gap:10px; margin-top:10px}
  .swatch{
    flex:none; width:30px; height:30px; border-radius:50%; cursor:pointer;
    border:2px solid transparent;
  }
  .swatch.active{border-color:var(--ink)}
  /* ---------- お絵かきエディタ ---------- */
  #editor{
    position:fixed; inset:0; z-index:50; display:none;
    align-items:center; justify-content:center;
    background:rgba(30,30,29,.45); backdrop-filter:blur(8px);
    padding:20px;
  }
  .edcard{
    width:100%; max-width:360px; background:var(--card);
    border-radius:20px; padding:18px 18px 16px;
    box-shadow:var(--shadow);
  }
  .edtitle{
    font-family:"Hiragino Kaku Gothic ProN",sans-serif; text-align:center;
    font-size:13px; letter-spacing:.3em; text-indent:.3em; margin-bottom:12px;
  }
  .edstage{
    display:flex; justify-content:center;
    background:
      conic-gradient(#26282d 25%, #2e3036 0 50%, #26282d 0 75%, #2e3036 0) 0 0/16px 16px;
    border-radius:14px; padding:10px;
  }
  #edCanvas{
    width:210px; height:280px; touch-action:none; cursor:crosshair;
    background:linear-gradient(#f4e2d7,#eccfc0);
    border-radius:70px 70px 54px 54px;
    box-shadow:0 4px 14px rgba(0,0,0,.4);
  }
  .edrow{display:flex; gap:8px; align-items:center; margin-top:12px; flex-wrap:wrap}
  .edsw{
    width:26px; height:26px; border-radius:50%; cursor:pointer;
    box-shadow:inset 0 -4px 6px rgba(0,0,0,.14), 0 1px 4px rgba(0,0,0,.12);
  }
  .edbtn{
    border:1px solid var(--line); border-radius:10px; padding:8px 14px;
    background:transparent; color:var(--sub); font-family:inherit;
    font-size:11px; letter-spacing:.1em; cursor:pointer;
  }
  .edbtn.on{border-color:var(--ink); color:var(--ink)}
  .edbtn.primary{background:linear-gradient(135deg, #6a97ff, #3560e6); color:#f6f8ff; border-color:transparent}
  .edrow.acts{justify-content:flex-end; margin-top:14px}
</style>
</head>
<body>
<header>
  <div class="overline">Hand &amp; Light Atelier</div>
  <h1>磨</h1>
  <div class="rule"></div>
</header>

<div class="stage">
  <canvas id="canvas"></canvas>
  <div id="guide" style="opacity:0">手をかざしてください</div>
  <div id="countdown"></div>

  <div id="startOverlay">
    <p class="invite">手をかざす</p>
    <button class="bigbtn" id="startBtn">はじめる</button>
    <div id="status"></div>
  </div>

  <div class="stagebtns" id="liveBtns" style="display:none">
    <button class="roundbtn" id="timerBtn" title="セルフタイマー">3s</button>
    <button class="shutter" id="shutterBtn" title="撮影"></button>
    <button class="roundbtn" id="flipBtn" title="カメラ切替">⟲</button>
  </div>

  <div id="snapBar">
    <button class="pill primary" id="saveBtn">保存する</button>
    <button class="pill" id="retryBtn">もう一度</button>
  </div>
</div>

<div class="panel">
  <div class="tabs">
    <div class="tab active" data-t="looks">デザイン</div>
    <div class="tab" data-t="colors">カラー</div>
    <div class="tab" data-t="tune">質感</div>
    <div class="tab" data-t="hikari">光</div>
    <div class="tab" data-t="care">ケア</div>
  </div>

  <div class="tray active" id="tray-looks">
    <div class="scroller" id="looksRow"></div>
  </div>

  <div class="tray" id="tray-colors">
    <div class="scroller" id="chips"></div>
    <div class="minirow">
      <span class="ghostlink" onclick="document.getElementById('inspoInput').click()">写真</span>
      <span class="ghostlink" onclick="document.getElementById('colorPicker').click()">好きな色を選ぶ</span>
    </div>
    <div id="note"></div>
  </div>

  <div class="tray" id="tray-tune">
    <div class="presetgroup">
      <div class="presetlabel">ツヤ</div>
      <div class="presetrow" data-key="gloss">
        <button class="presetbtn" data-val="10">マット</button>
        <button class="presetbtn active" data-val="65">セミグロス</button>
        <button class="presetbtn" data-val="100">ツヤツヤ</button>
      </div>
    </div>
    <div class="presetgroup">
      <div class="presetlabel">濃さ</div>
      <div class="presetrow" data-key="opacity">
        <button class="presetbtn" data-val="65">うすづき</button>
        <button class="presetbtn active" data-val="96">ふつう</button>
        <button class="presetbtn" data-val="100">しっかり</button>
      </div>
    </div>
    <div class="presetgroup">
      <div class="presetlabel">大きさ</div>
      <div class="presetrow" data-key="nailSize">
        <button class="presetbtn" data-val="85">ナチュラル</button>
        <button class="presetbtn active" data-val="100">ふつう</button>
        <button class="presetbtn" data-val="120">長め</button>
      </div>
    </div>
  </div>

  <div class="tray" id="tray-hikari">
    <div class="toggle-row">
      <span>指先に光の軌跡を残す</span>
      <div class="switch on" id="trailSwitch"></div>
    </div>
    <div class="minirow">軌跡の強さ <input type="range" id="trailIntensity" min="0" max="100" value="55"></div>
    <div class="minirow">色</div>
    <div class="swatchrow" id="trailSwatches"></div>
    <p class="hikari-desc">手を動かすたび、爪の色に呼応した光がやわらかく尾を引きます。手を止めると静かに消えていきます。</p>
  </div>

  <div class="tray" id="tray-care">
    <div class="toggle-row">
      <span>色を塗らず地爪をきれいに見せる</span>
      <div class="switch" id="careSwitch"></div>
    </div>
    <div class="minirow">補正の強さ <input type="range" id="careIntensity" min="0" max="100" value="60"></div>
    <p class="hikari-desc">デザインやカラーは重ねず、素の爪と手の色艶を自然に引き立てます。オンの間はデザイン・カラーの選択は反映されません。</p>
  </div>
</div>

<input type="file" id="inspoInput" accept="image/*">
<input type="file" id="designInput" accept="image/*">
<input type="color" id="colorPicker" value="#101113" style="position:absolute; opacity:0; pointer-events:none; width:1px; height:1px;">
<video id="video" playsinline style="display:none"></video>

<!-- お絵かきエディタ -->
<div id="editor">
  <div class="edcard">
    <div class="edtitle">マイデザインを描く</div>
    <div class="edstage"><canvas id="edCanvas" width="300" height="400"></canvas></div>
    <div class="edrow" id="edSwatches"></div>
    <div class="edrow tools">
      <button class="edbtn on" id="edPen">ペン</button>
      <button class="edbtn" id="edErase">消しゴム</button>
      <button class="edbtn" id="edClear">全消し</button>
      <input type="range" id="edSize" min="3" max="46" value="14">
    </div>
    <div class="edrow acts">
      <button class="edbtn" id="edCancel">やめる</button>
      <button class="edbtn primary" id="edDone">これを爪に乗せる</button>
    </div>
  </div>
</div>

<script>
/* ================= 状態 ================= */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('video');
let mode = 'idle';            // idle | live | frozen
let facing = 'environment';
let stream = null;
let currentColor = '#101113';
let currentLook = 'onecolor';
let smoothed = [];
let rafOn = false;
const tuneVals = { gloss:65, opacity:96, nailSize:100 };
let careOn = false, careIntensity = 60;
function careFilterString(){
  const t = careIntensity/100;
  return `brightness(${1+0.10*t}) saturate(${1+0.22*t}) contrast(${1+0.06*t})`;
}
const $ = id => document.getElementById(id);

function setStatus(t){ $('status').textContent = t || ''; }
function setGuide(t){
  const g = $('guide');
  g.textContent = t || '';
  g.style.opacity = t ? 1 : 0;
}

/* ================= MediaPipe（初期化を待ってから使う） ================= */
const MP_CDN = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/';
let liveHands = null, liveReady = null;

function makeHands(opts){
  const h = new Hands({locateFile: f => MP_CDN + f});
  h.setOptions(opts);
  return h;
}
function ensureLive(){
  if(window.__mpFailed) return Promise.reject(new Error('cdn'));
  if(!liveReady){
    liveHands = makeHands({maxNumHands:2, modelComplexity:0, minDetectionConfidence:0.6, minTrackingConfidence:0.6});
    liveHands.onResults(res => {
      const lms = res.multiHandLandmarks || [];
      if(lms.length){ lastSeenT = performance.now(); updateLandmarks(lms); }
      else if(performance.now() - lastSeenT > 280){ smoothed.length = 0; }
      liveBusy = false;
    });
    liveReady = liveHands.initialize();
  }
  return liveReady;
}
let lastSeenT = 0;
function updateLandmarks(lms){
  const now = performance.now();
  const dt = Math.min(0.1, Math.max(0.001, (now - (updateLandmarks._t||now-16))/1000));
  updateLandmarks._t = now;
  lms.forEach((lm,h) => {
    if(!smoothed[h] || smoothed[h].length !== lm.length){
      smoothed[h] = lm.map(p=>({x:p.x, y:p.y, vx:0, vy:0}));
      return;
    }
    lm.forEach((p,i)=>{
      const s = smoothed[h][i];
      [['x','vx'],['y','vy']].forEach(([ax,v])=>{
        const d = p[ax]-s[ax];
        if(Math.abs(d) < 0.0022){ s[v]*=0.5; return; }
        const dv = d/dt;
        s[v] += alphaFor(1.0, dt)*(dv - s[v]);
        const cutoff = 1.2 + 40*Math.abs(s[v]);
        s[ax] += alphaFor(cutoff, dt)*d;
      });
    });
  });
  smoothed.length = lms.length;
}
function alphaFor(cutoff, dt){
  const r = 2*Math.PI*cutoff*dt;
  return r/(r+1);
}

/* ================= カメラ ================= */
async function startCamera(){
  setStatus('準備しています…');
  try{ await ensureLive(); }
  catch(e){
    setStatus('AIモデルを読み込めませんでした。通信環境を確認して再読み込みしてください。');
    return;
  }
  try{
    if(stream) stream.getTracks().forEach(t=>t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing, width:{ideal:1280}, height:{ideal:720}}, audio:false
    });
    video.srcObject = stream;
    await video.play();
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    mode = 'live';
    smoothed = [];
    nailState.length = 0;
    trails.length = 0;
    $('startOverlay').style.display='none';
    $('liveBtns').style.display='flex';
    $('snapBar').style.display='none';
    setGuide('手をかざしてください');
    setStatus('');
    startLoops();
  }catch(e){
    setStatus('カメラを使えませんでした。ブラウザの設定でカメラを許可してください。(' + e.name + ')');
  }
}

/* 描画ループ：AIとは独立して映像を常に描く */
let liveBusy = false;
function startLoops(){
  if(rafOn) return;
  rafOn = true;
  let lastT = performance.now();
  (function draw(now){
    const dt = Math.min(0.05, Math.max(0.001, (now - lastT)/1000)); lastT = now;
    if(mode === 'live' && video.readyState >= 2){
      ctx.save();
      if(mirrored()){ ctx.translate(canvas.width,0); ctx.scale(-1,1); }
      ctx.filter = careOn ? careFilterString() : 'none';
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      ctx.filter = 'none';
      ctx.restore();
      recordTrails();
      drawTrails(dt);
      drawNails();
      setGuide(smoothed.length ? '' : '手をかざしてください');
    }
    requestAnimationFrame(draw);
  })(lastT);
  (async function detect(){
    if(mode === 'live' && video.readyState >= 2 && !liveBusy){
      liveBusy = true;
      try{ await liveHands.send({image: video}); }
      catch(e){ liveBusy = false; }
    }
    requestAnimationFrame(detect);
  })();
}

async function loadImage(file){
  let bmp;
  try{ bmp = await createImageBitmap(file, {imageOrientation:'from-image'}); }
  catch(e){
    bmp = await new Promise(r=>{ const img=new Image(); img.onload=()=>r(img); img.src=URL.createObjectURL(file); });
  }
  const MAX = 1400;
  const sc = Math.min(1, MAX/Math.max(bmp.width, bmp.height));
  const c = document.createElement('canvas');
  c.width = Math.round(bmp.width*sc); c.height = Math.round(bmp.height*sc);
  c.getContext('2d').drawImage(bmp,0,0,c.width,c.height);
  return c;
}

/* ================= 爪の描画 ================= */
const FINGERS = [[4,3],[8,7],[12,11],[16,15],[20,19]];
const nailState = [];
function mirrored(){ return facing==='user'; }
const PREDICT_S = 0.08; // 映像は即時、検出結果はこの位置遅れて届くので速度から先読みして補う
function lmXY(p){
  const px = p.x + (p.vx||0)*PREDICT_S;
  const py = p.y + (p.vy||0)*PREDICT_S;
  let x = px*canvas.width, y = py*canvas.height;
  if(mirrored()) x = canvas.width - x;
  return [x,y];
}
function drawNails(){
  const alpha = tuneVals.opacity/100;
  const gloss = tuneVals.gloss/100;
  const scale = tuneVals.nailSize/100;
  smoothed.forEach((lm, hi)=>{
    FINGERS.forEach(([tip,dip], fi)=>{
      const [tx,ty]=lmXY(lm[tip]), [dx,dy]=lmXY(lm[dip]);
      const rawLen = Math.hypot(tx-dx,ty-dy);
      if(rawLen < 4) return;
      const rawAng = Math.atan2(ty-dy,tx-dx);
      const st = nailState[hi*5+fi] || (nailState[hi*5+fi] = {len:rawLen, ang:rawAng});
      const dLen = rawLen - st.len;
      if(Math.abs(dLen) > st.len*0.035) st.len += dLen*Math.min(1, 0.35 + Math.abs(dLen)/st.len*1.6);
      let dAng = ((rawAng - st.ang + Math.PI*3) % (Math.PI*2)) - Math.PI;
      if(Math.abs(dAng) > 0.035) st.ang += dAng*Math.min(1, 0.4 + Math.abs(dAng)*3);
      const len = st.len, ang = st.ang;
      const w = len*0.54*scale, h = len*0.94*scale;
      ctx.save();
      ctx.translate(tx+Math.cos(ang)*len*0.10, ty+Math.sin(ang)*len*0.10);
      ctx.rotate(ang+Math.PI/2);
      nailPath(w,h);
      ctx.clip();
      ctx.globalAlpha = alpha;
      if(!careOn){
        paintLook(ctx,w,h,currentColor,hi*5+fi);
        if(gloss < 0.5){
          // マット寄りの質感ほど、デザイン自体が持つツヤ由来のグラデーションも上から均して消す
          const flat = Math.max(0, 1 - gloss*2);
          ctx.globalAlpha = alpha*flat*0.6;
          ctx.fillStyle = shade(currentColor,-6);
          ctx.fillRect(-w,-h,w*2,h*2);
        }
      }
      // ケア中は色を塗らず、映像側の補正(careFilterString)で実際の爪の色艶を活かす。
      // ここではツヤの見せ方(ハイライト・縁の陰影)だけを重ねる。
      const careT = careIntensity/100;
      ctx.globalAlpha = (careOn ? careT : alpha) * 0.3;
      const rim = ctx.createRadialGradient(0,0,Math.min(w,h)*0.35, 0,0,Math.max(w,h)*0.75);
      rim.addColorStop(0,'rgba(0,0,0,0)');
      rim.addColorStop(1, careOn ? 'rgba(20,18,16,.35)' : 'rgba(30,30,28,.5)');
      ctx.fillStyle=rim; ctx.fillRect(-w,-h,w*2,h*2);
      const glossEff = careOn ? careT : gloss;
      if(glossEff>0.05){
        ctx.globalAlpha = (careOn ? careT : alpha) * glossEff*0.6;
        ctx.fillStyle='#fff';
        ctx.beginPath();
        ctx.ellipse(-w*0.18,-h*0.20,w*0.15,h*0.26,-0.3,0,Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = (careOn ? careT : alpha) * glossEff*0.28;
        ctx.beginPath();
        ctx.ellipse(w*0.2,h*0.05,w*0.09,h*0.15,0.2,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    });
  });
}
function nailPath(w,h){
  ctx.beginPath();
  ctx.moveTo(-w/2, h*0.26);
  ctx.bezierCurveTo(-w/2, -h*0.26, -w*0.32, -h*0.50, 0, -h*0.50);
  ctx.bezierCurveTo(w*0.32, -h*0.50, w/2, -h*0.26, w/2, h*0.26);
  ctx.bezierCurveTo(w/2, h*0.46, w*0.28, h*0.56, 0, h*0.56);
  ctx.bezierCurveTo(-w*0.28, h*0.56, -w/2, h*0.46, -w/2, h*0.26);
  ctx.closePath();
}

/* ================= 光の軌跡（アート表現） ================= */
let trailOn = true;
let trailIntensity = 55;
let trailHue = null; // null = ネイルカラーに追従
const TRAIL_LIFE = 620; // ms
const trails = []; // {x,y,born,color}
let lastTrailPos = null;

function currentTrailColor(){
  return trailHue || currentColor;
}
function recordTrails(){
  if(!trailOn || !smoothed.length) return;
  const now = performance.now();
  const col = currentTrailColor();
  smoothed.forEach(lm=>{
    FINGERS.forEach(([tip])=>{
      const [x,y] = lmXY(lm[tip]);
      const last = trails.length ? trails[trails.length-1] : null;
      if(last && Math.hypot(x-last.x, y-last.y) < 3) return;
      trails.push({x,y,born:now,color:col});
    });
  });
  const cutoff = now - TRAIL_LIFE;
  while(trails.length && trails[0].born < cutoff) trails.shift();
  if(trails.length > 420) trails.splice(0, trails.length-420);
}
function drawTrails(){
  if(!trails.length) return;
  const now = performance.now();
  const strength = trailIntensity/100;
  if(strength<=0) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  trails.forEach(pt=>{
    const age = (now - pt.born)/TRAIL_LIFE;
    if(age >= 1) return;
    const life = 1-age;
    const r = 4 + life*16;
    const g = ctx.createRadialGradient(pt.x,pt.y,0, pt.x,pt.y,r);
    const glow = shade(pt.color, 70);
    g.addColorStop(0, hexA(glow, life*0.55*strength));
    g.addColorStop(0.5, hexA(pt.color, life*0.28*strength));
    g.addColorStop(1, hexA(pt.color, 0));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,r,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}
function buildTrailSwatches(){
  const row = $('trailSwatches');
  row.innerHTML='';
  const opts = [
    {label:'ネイルカラーと同じ', val:null},
    {label:'アイスシルバー', val:'#d8dce2'},
    {label:'ゴールド', val:'#c9a227'},
    {label:'ガンメタル', val:'#3c3f45'},
    {label:'レッド', val:'#b3271e'},
  ];
  opts.forEach(o=>{
    const el = document.createElement('div');

    el.style.background = o.val || 'linear-gradient(135deg,#b3271e,#c9a227,#d8dce2)';
    el.title = o.label;
    el.onclick = ()=>{

      row.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
    };

  });
}

/* ================= デザイン12種 ================= */
function seeded(seed){ let s=seed*9301+49297; return ()=>{ s=(s*9301+49297)%233280; return s/233280; }; }
function base(c,w,h,c1,c2){
  const g = c.createLinearGradient(0,-h/2,0,h/2);
  g.addColorStop(0,c1); g.addColorStop(1,c2);
  c.fillStyle=g; c.fillRect(-w/2,-h/2,w,h*1.2);
}
function nudeBase(c,w,h,a){
  const keep=c.globalAlpha; c.globalAlpha=keep*a;
  base(c,w,h,'#f0dcd1','#e5c7b8'); c.globalAlpha=keep;
}
function heart(c,x,y,s){
  c.save(); c.translate(x,y); c.scale(s,s);
  c.beginPath();
  c.moveTo(0,0.35);
  c.bezierCurveTo(-1.1,-0.5,-0.45,-1.2,0,-0.5);
  c.bezierCurveTo(0.45,-1.2,1.1,-0.5,0,0.35);
  c.closePath(); c.fill(); c.restore();
}
const LOOKS = {
  onecolor:{name:'ワンカラー', paint(c,w,h,col){ base(c,w,h,shade(col,18),shade(col,-14)); }},
  mizuhikari:{name:'水光マグネット', paint(c,w,h,col,seed){
    base(c,w,h,shade(col,-18),shade(col,-38));
    const g=c.createLinearGradient(-w*0.45,h*0.35,w*0.45,-h*0.45);
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(.48,hexA(shade(col,85),.9));
    g.addColorStop(.55,hexA(shade(col,110),.7));
    g.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle=g; c.fillRect(-w/2,-h/2,w,h*1.2);
    const rnd=seeded(seed+11);
    c.fillStyle='rgba(255,255,255,.9)';
    for(let i=0;i<14;i++){
      const x=(rnd()-0.5)*w, y=(rnd()-0.5)*h;
      c.beginPath(); c.arc(x,y,w*0.014+rnd()*w*0.012,0,Math.PI*2); c.fill();
    }
  }},
  flash:{name:'フラッシュ', paint(c,w,h,col,seed){
    base(c,w,h,shade(col,-5),shade(col,-25));
    const rnd=seeded(seed+29);
    for(let i=0;i<60;i++){
      const x=(rnd()-0.5)*w, y=(rnd()-0.5)*h*1.1, r=rnd()*w*0.03+w*0.008;
      const t=rnd();
      c.fillStyle = t>0.66 ? 'rgba(255,255,255,.95)' : t>0.33 ? hexA(shade(col,90),.85) : 'rgba(230,225,255,.7)';
      c.beginPath(); c.arc(x,y,r,0,Math.PI*2); c.fill();
    }
  }},
  chrome:{name:'クロム', paint(c,w,h,col){
    const g=c.createLinearGradient(-w/2,0,w/2,0);
    g.addColorStop(0,shade(col,-30)); g.addColorStop(.22,shade(col,70));
    g.addColorStop(.45,shade(col,-10)); g.addColorStop(.62,shade(col,105));
    g.addColorStop(.82,shade(col,-24)); g.addColorStop(1,shade(col,35));
    c.fillStyle=g; c.fillRect(-w/2,-h/2,w,h*1.2);
    c.fillStyle='rgba(255,255,255,.55)';
    c.fillRect(-w*0.06,-h/2,w*0.05,h*1.2);
  }},
  matte:{name:'マット', paint(c,w,h,col,seed){
    base(c,w,h,shade(col,-4),shade(col,-26));
    const rnd=seeded(seed+53);
    for(let i=0;i<70;i++){
      const x=(rnd()-0.5)*w, y=(rnd()-0.5)*h*1.1;
      c.fillStyle = rnd()>0.5 ? 'rgba(0,0,0,.07)' : 'rgba(255,255,255,.05)';
      c.beginPath(); c.arc(x,y,w*0.02+rnd()*w*0.015,0,Math.PI*2); c.fill();
    }
  }},
  microart:{name:'マイクロアート', paint(c,w,h,col){
    base(c,w,h,'#f1e8df','#e6d6c8');
    const keep=c.globalAlpha; c.globalAlpha=keep*0.18;
    base(c,w,h,shade(col,20),shade(col,-10));
    c.globalAlpha=keep;
    c.fillStyle='rgba(24,21,18,.88)';
    c.save(); c.translate(w*0.12,h*0.14); c.scale(w*0.15,w*0.15);
    c.beginPath();
    c.moveTo(0,0.55);
    c.bezierCurveTo(-0.5,0.15,-0.35,-0.35,0.05,-0.6);
    c.bezierCurveTo(-0.05,-0.25,0.2,-0.15,0.22,0.05);
    c.bezierCurveTo(0.35,-0.05,0.32,-0.3,0.2,-0.5);
    c.bezierCurveTo(0.55,-0.25,0.5,0.25,0,0.55);
    c.closePath(); c.fill();
    c.restore();
  }},
  geometric:{name:'ジオメトリック', paint(c,w,h,col,seed){
    base(c,w,h,shade(col,-6),shade(col,-30));
    c.strokeStyle='rgba(255,255,255,.55)';
    c.lineWidth=Math.max(1,w*0.018);
    c.beginPath();
    c.moveTo(-w*0.4,h*0.3); c.lineTo(w*0.1,-h*0.4);
    c.moveTo(-w*0.1,h*0.5); c.lineTo(w*0.4,-h*0.15);
    c.stroke();
    c.fillStyle='rgba(255,255,255,.85)';
    c.beginPath();
    c.moveTo(w*0.18,h*0.28); c.lineTo(w*0.32,h*0.28); c.lineTo(w*0.25,h*0.12);
    c.closePath(); c.fill();
  }},
  wanghong:{name:'ワンホン', paint(c,w,h,col,seed){
    nudeBase(c,w,h,.85);
    c.fillStyle=shade(col,8);
    c.beginPath();
    c.moveTo(-w/2,-h*0.10); c.quadraticCurveTo(0,-h*0.32,w/2,-h*0.10);
    c.lineTo(w/2,-h/2); c.lineTo(-w/2,-h/2); c.closePath(); c.fill();
    c.fillStyle='rgba(255,255,255,.95)';
    c.beginPath(); c.arc(-w*0.12,h*0.10,w*0.055,0,Math.PI*2); c.fill();
    c.fillStyle='#e8c987';
    c.beginPath(); c.arc(w*0.02,h*0.16,w*0.04,0,Math.PI*2); c.fill();
    c.fillStyle=hexA(col,.9);
    heart(c, w*0.14, h*0.02, w*0.09);
  }},
  french:{name:'フレンチ', paint(c,w,h,col){
    nudeBase(c,w,h,.45);
    c.fillStyle=shade(col,5);
    c.beginPath();
    c.moveTo(-w/2,-h*0.14); c.quadraticCurveTo(0,-h*0.34,w/2,-h*0.14);
    c.lineTo(w/2,-h/2); c.lineTo(-w/2,-h/2); c.closePath(); c.fill();
  }},
  grad:{name:'グラデ', paint(c,w,h,col){
    nudeBase(c,w,h,.4);
    const g=c.createLinearGradient(0,h/2,0,-h/2);
    g.addColorStop(0,'rgba(240,220,209,.25)');
    g.addColorStop(.42,hexA(col,.7));
    g.addColorStop(1,shade(col,-10));
    c.fillStyle=g; c.fillRect(-w/2,-h/2,w,h*1.2);
  }},
  aurora:{name:'オーロラ', paint(c,w,h,col){
    nudeBase(c,w,h,.55);
    const keep=c.globalAlpha;
    const veils=[['#ffd9e8',-w*0.2,-h*0.2],['#d3e6ff',w*0.18,h*0.05],['#dff5e1',-w*0.05,h*0.3],[shade(col,55),w*0.1,-h*0.3]];
    veils.forEach(([vc,x,y])=>{
      c.globalAlpha=keep*.4;
      const g=c.createRadialGradient(x,y,0,x,y,w*0.7);
      g.addColorStop(0,vc); g.addColorStop(1,'rgba(255,255,255,0)');
      c.fillStyle=g; c.fillRect(-w/2,-h/2,w,h*1.2);
    });
    c.globalAlpha=keep;
  }},
};

/* ================= マイデザイン（自作を乗せる） ================= */
const customLooks = [];   // {name, img}
const DESIGN_KEY = 'migaki.designs';
(function loadSavedDesigns(){
  let arr=[]; try{ arr=JSON.parse(localStorage.getItem(DESIGN_KEY)||'[]'); }catch(e){}
  arr.forEach(d=>{
    const img=new Image();
    img.onload=()=>{ try{ buildLooks(); }catch(e){} };
    img.src=d.data;
    customLooks.push({name:d.name, img});
  });
})();
function paintLook(c,w,h,col,seed){ paintByKey(c,currentLook,w,h,col,seed); }
function paintByKey(c,key,w,h,col,seed){
  if(key.startsWith('custom:')){
    const cl = customLooks[+key.slice(7)];
    if(cl) drawCover(c, cl.img, w, h);
    return;
  }
  const lk = LOOKS[key];
  lk.paint(c,w,h,col,seed);
}
function drawCover(c,img,w,h){
  const H = h*1.2;
  const sc = Math.max(w/img.width, H/img.height);
  c.drawImage(img, -img.width*sc/2, -h/2 + (H-img.height*sc)/2, img.width*sc, img.height*sc);
}
function addCustomLook(img, name){
  customLooks.push({name: name || 'マイデザイン'+(customLooks.length+1), img});
  currentLook = 'custom:' + (customLooks.length-1);
  buildLooks();
}
$('designInput').addEventListener('change', async e=>{
  const file=e.target.files[0]; if(!file) return;
  const img=await loadImage(file);
  addCustomLook(img, file.name.replace(/\.[^.]+$/,'').slice(0,8));
  e.target.value='';
});

/* ルックサムネ */
function buildLooks(){
  const row = $('looksRow');
  row.innerHTML='';
  const entries = [
    ...Object.entries(LOOKS),
    ...customLooks.map((cl,i)=>['custom:'+i, cl]),
  ];
  entries.forEach(([key,look])=>{
    const div=document.createElement('div');
    div.className='look'+(key===currentLook?' active':'');
    div.dataset.key=key;
    const cv=document.createElement('canvas'); cv.width=104; cv.height=132;
    div.appendChild(cv);
    const sp=document.createElement('span'); sp.textContent=look.name; div.appendChild(sp);
    div.onclick=()=>{
      currentLook=key;
      row.querySelectorAll('.look').forEach(x=>x.classList.remove('active'));
      div.classList.add('active');
      refreshThumbs();
    };
    row.appendChild(div);
  });
  [['✎ 描く', ()=>openEditor()], ['＋ 画像', ()=>$('designInput').click()]].forEach(([label,fn])=>{
    const div=document.createElement('div');
    div.className='look addtile';
    const box=document.createElement('div'); box.className='addbox'; box.textContent=label;
    div.appendChild(box);
    const sp=document.createElement('span'); sp.textContent='マイデザイン'; div.appendChild(sp);
    div.onclick=fn;
    row.appendChild(div);
  });
  refreshThumbs();
}
/* サムネイルは選択中の色に関係なく、デザインごとの見本カラーで塗る（一覧が単色に潰れないように） */
const SHOWCASE = {
  onecolor:'#b3271e', mizuhikari:'#3f6fee', flash:'#7a1f2b',
  chrome:'#8a8f96', matte:'#101113', microart:'#e8e6df', geometric:'#3c3f45',
  wanghong:'#c9a227', french:'#e8e6df', grad:'#3f6fee', aurora:'#c9a227',
};
function refreshThumbs(){
  const row=$('looksRow');
  [...row.children].forEach(div=>{
    const key=div.dataset.key; if(!key) return;
    const cv=div.querySelector('canvas'); const c=cv.getContext('2d');
    c.setTransform(1,0,0,1,0,0); c.clearRect(0,0,104,132);
    c.translate(52,66);
    const w=88,hh=120;
    c.save();
    paintByKey(c,key,w,hh,SHOWCASE[key]||currentColor,Object.keys(LOOKS).indexOf(key));
    c.globalAlpha=.35; c.fillStyle='#fff';
    c.beginPath(); c.ellipse(-w*0.18,-hh*0.2,w*0.15,hh*0.24,-0.3,0,Math.PI*2); c.fill();
    c.restore();
  });
}

/* ================= お絵かきエディタ ================= */
const ed = { canvas:null, ctx:null, drawing:false, size:14, erase:false };
function openEditor(){
  $('editor').style.display='flex';
  if(!ed.canvas){
    ed.canvas=$('edCanvas'); ed.ctx=ed.canvas.getContext('2d');
    const c=ed.ctx;
    edClear();
    const pos=ev=>{
      const r=ed.canvas.getBoundingClientRect();
      const p=ev.touches? ev.touches[0]: ev;
      return [(p.clientX-r.left)*ed.canvas.width/r.width, (p.clientY-r.top)*ed.canvas.height/r.height];
    };
    const start=ev=>{ ed.drawing=true; const [x,y]=pos(ev); stroke(x,y,true); ev.preventDefault(); };
    const move=ev=>{ if(!ed.drawing) return; const [x,y]=pos(ev); stroke(x,y,false); ev.preventDefault(); };
    const end=()=>{ ed.drawing=false; };
    function stroke(x,y,first){
      c.globalCompositeOperation = ed.erase ? 'destination-out' : 'source-over';
      c.strokeStyle=currentColor; c.fillStyle=currentColor;
      c.lineWidth=ed.size; c.lineCap='round'; c.lineJoin='round';
      if(first){ c.beginPath(); c.arc(x,y,ed.size/2,0,Math.PI*2); c.fill(); c.beginPath(); c.moveTo(x,y); }
      else { c.lineTo(x,y); c.stroke(); }
    }
    ed.canvas.addEventListener('pointerdown',start);
    ed.canvas.addEventListener('pointermove',move);
    window.addEventListener('pointerup',end);
    $('edSize').addEventListener('input',e=>{ ed.size=+e.target.value; });
    $('edPen').onclick=()=>{ ed.erase=false; $('edPen').classList.add('on'); $('edErase').classList.remove('on'); };
    $('edErase').onclick=()=>{ ed.erase=true; $('edErase').classList.add('on'); $('edPen').classList.remove('on'); };
    $('edClear').onclick=edClear;
    $('edCancel').onclick=()=>{ $('editor').style.display='none'; };
    $('edDone').onclick=()=>{
      const out=document.createElement('canvas');
      out.width=ed.canvas.width; out.height=ed.canvas.height;
      const oc=out.getContext('2d');
      const g=oc.createLinearGradient(0,0,0,out.height);
      g.addColorStop(0,'#f4e2d7'); g.addColorStop(1,'#eccfc0');
      oc.fillStyle=g; oc.fillRect(0,0,out.width,out.height);
      oc.drawImage(ed.canvas,0,0);
      addCustomLook(out);
      $('editor').style.display='none';
    };
  }
  const sw=$('edSwatches'); sw.innerHTML='';
  currentPalette.forEach(col=>{
    const s=document.createElement('div');
    s.className='edsw'; s.style.background=col;
    s.onclick=()=>{ currentColor=col; ed.erase=false; $('edPen').classList.add('on'); $('edErase').classList.remove('on'); };
    sw.appendChild(s);
  });
}
function edClear(){ ed.ctx.clearRect(0,0,ed.canvas.width,ed.canvas.height); }

/* ================= カラー（クール＆モードな配色） ================= */
const defaultPalette=[
  '#101113', /* ジェットブラック */ '#b3271e', /* レッド */
  '#d4a017', /* マスタードイエロー */ '#3f6fee', /* コバルトブルー */
  '#0f3d3a', /* エメラルド */      '#7a1f2b', /* ワイン */
  '#c9a227', /* ゴールド */        '#1c2b4a', /* ネイビー */
  '#8a8f96', /* シルバー */        '#3c3f45', /* ガンメタル */
  '#b5502e', /* ラスト */          '#e8e6df', /* アイスホワイト */
];
let currentPalette = [];
function renderChips(pal){
  currentPalette = pal;
  const box=$('chips'); box.innerHTML='';
  pal.forEach((col,i)=>{
    const el=document.createElement('div');
    el.className='chip'+(i===0?' active':'');
    el.style.background=`linear-gradient(145deg, ${col}, ${shade(col,-22)})`;
    el.onclick=()=>{
      currentColor=col;
      box.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      refreshThumbs();
    };
    box.appendChild(el);
    if(i===0) currentColor=col;
  });
  const picker=document.createElement('div');
  picker.className='chip picker';
  picker.title='好きな色を選ぶ';
  picker.onclick=()=>$('colorPicker').click();
  box.appendChild(picker);
  refreshThumbs();
}
$('colorPicker').addEventListener('input', e=>{
  currentColor = e.target.value;
  $('chips').querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  $('chips').querySelector('.picker').classList.add('active');
  refreshThumbs();
});
$('inspoInput').addEventListener('change', async e=>{
  const file=e.target.files[0]; if(!file) return;
  const img=await loadImage(file);
  renderChips(extractPalette(img,12));
  $('note').textContent='この写真からもらった配色です。';
});
function extractPalette(img,n){
  const c=document.createElement('canvas'); const s=80; c.width=s;c.height=s;
  c.getContext('2d').drawImage(img,0,0,s,s);
  const d=c.getContext('2d').getImageData(0,0,s,s).data;
  const buckets={};
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
    if(mx-mn<18&&(mx>230||mx<40)) continue;
    const k=`${r>>5}_${g>>5}_${b>>5}`;
    if(!buckets[k])buckets[k]={r:0,g:0,b:0,c:0};
    buckets[k].r+=r;buckets[k].g+=g;buckets[k].b+=b;buckets[k].c++;
  }
  return Object.values(buckets).sort((a,b)=>b.c-a.c).slice(0,n)
    .map(x=>rgb2hex(x.r/x.c,x.g/x.c,x.b/x.c));
}
/* ================= ユーティリティ ================= */
function rgb2hex(r,g,b){return '#'+[r,g,b].map(v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('')}
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  return rgb2hex((n>>16)+amt,(n>>8&255)+amt,(n&255)+amt);
}
function hexA(hex,a){
  const n=parseInt(hex.slice(1),16);
  return `rgba(${n>>16},${n>>8&255},${n&255},${a})`;
}
